version: "3.9"

services:
  app:
    build: .
    container_name: go_url_service
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      - redis
    environment:
      REDIS_URL: redis:6379
      REDIS_COUNTER_URL: redis:6379
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
